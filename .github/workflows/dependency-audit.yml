name: Dependency Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # Run every Monday at 09:00 UTC to catch newly disclosed vulnerabilities
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        # Fail on high or critical vulnerabilities; moderate ones are reported only
        run: npm audit --audit-level=high
